name: Release UF2 firmware

# Tag-driven: `vX.Y.Z` builds RP2040 + RP2350 UF2s and attaches them
# to the GitHub release. Every push to master also publishes UF2s as
# the rolling `latest` prerelease. `workflow_dispatch` lets you build
# without tagging by providing an arbitrary tag name.
on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name for the release"
        required: true
        default: "v0.0.0-dev"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # Opt into Node.js 24 for JS actions that still bundle Node 20
  # (upload-artifact@v4, download-artifact@v4, softprops/action-gh-release@v2).
  # Node 20 is the default until June 2026; this silences the deprecation
  # warnings without waiting for new action releases.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.label }} UF2
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: rp2040
            target: thumbv6m-none-eabi
            bin: rp2040
            chip_feat: rp2040
            family_patch: false
          - label: rp2350
            target: thumbv8m.main-none-eabihf
            bin: rp2350
            chip_feat: rp2350
            # elf2uf2-rs hardcodes the RP2040 family ID — rewrite to
            # RP2350-ARM-S or the Pico 2 BOOTSEL drive rejects the file.
            family_patch: true
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.label }}

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.14.1

      - name: Install elf2uf2-rs + cargo-binutils
        # `--force` is load-bearing: Swatinem/rust-cache restores binstall's
        # "already installed" metadata without always restoring the matching
        # `~/.cargo/bin/` binaries, so a plain `cargo binstall` will short-
        # circuit and leave `rust-objcopy` missing on cache hits.
        run: |
          cargo binstall -y --force cargo-binutils
          cargo binstall -y --force elf2uf2-rs

      - name: Build firmware
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            --features ${{ matrix.chip_feat }},serial,midi \
            --bin ${{ matrix.bin }}

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "branch" ]; then
            echo "name=latest" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Package artifacts
        run: |
          ELF=target/${{ matrix.target }}/release/${{ matrix.bin }}
          BASE=rp-keyer-${{ steps.tag.outputs.name }}-${{ matrix.label }}

          $HOME/.cargo/bin/rust-objcopy -O binary "$ELF" "$BASE.bin"
          $HOME/.cargo/bin/elf2uf2-rs "$ELF" "$BASE.uf2"

          if [ "${{ matrix.family_patch }}" = "true" ]; then
            python3 scripts/patch_uf2_family.py "$BASE.uf2"
          fi

          cp "$ELF" "$BASE.elf"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.label }}
          path: rp-keyer-*
          if-no-files-found: error

  release:
    name: Attach UF2s to GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "branch" ]; then
            echo "name=latest" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          pattern: firmware-*
          merge-multiple: true

      # For the rolling `latest` release we need to move the tag to the
      # new commit. softprops/action-gh-release won't relocate an
      # existing tag, so wipe the previous release + tag first.
      - name: Reset rolling `latest` release
        if: steps.tag.outputs.name == 'latest'
        run: gh release delete latest --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.tag.outputs.name == 'latest' }}
          name: ${{ steps.tag.outputs.name == 'latest' && 'Latest master build' || steps.tag.outputs.name }}
          body: ${{ steps.tag.outputs.name == 'latest' && format('Rolling build of master @ {0}', github.sha) || '' }}
          files: firmware/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
